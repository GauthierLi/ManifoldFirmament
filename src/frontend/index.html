<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINOv3 UMAP 3D 可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #0a0a0f;
            color: #fff;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 12px;
            max-width: 350px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #info-panel h1 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #60a5fa;
        }
        
        #info-panel .stat {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }
        
        #info-panel .stat:last-child {
            border-bottom: none;
        }
        
        #info-panel .stat-label {
            color: #9ca3af;
        }
        
        #info-panel .stat-value {
            color: #fff;
            font-weight: 500;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        #loading .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 12px 20px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #controls button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        #controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        #controls button.active {
            background: #60a5fa;
            color: #000;
        }
        
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            pointer-events: none;
            display: none;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
        }
        
        #tooltip .path {
            color: #60a5fa;
            word-break: break-all;
            margin-bottom: 8px;
        }
        
        #tooltip .index {
            color: #9ca3af;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="info-panel">
        <h1>🌌 DINOv3 UMAP 可视化</h1>
        <div class="stat">
            <span class="stat-label">点数</span>
            <span class="stat-value" id="stat-points">-</span>
        </div>
        <div class="stat">
            <span class="stat-label">特征维度</span>
            <span class="stat-value" id="stat-dim">-</span>
        </div>
        <div class="stat">
            <span class="stat-label">模型</span>
            <span class="stat-value" id="stat-model">-</span>
        </div>
        <div class="stat">
            <span class="stat-label">UMAP 邻居</span>
            <span class="stat-value" id="stat-neighbors">-</span>
        </div>
    </div>
    
    <div id="loading">
        <div class="spinner"></div>
        <p>加载数据中...</p>
    </div>
    
    <div id="controls">
        <button id="btn-rotate" class="active">🔄 自动旋转</button>
        <button id="btn-reset">🎯 重置视角</button>
        <button id="btn-screenshot">📷 截图</button>
    </div>
    
    <div id="tooltip"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="viewer.js"></script>
</body>
</html>
