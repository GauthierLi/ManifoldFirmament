<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DINOv3 UMAP 3D 可视化</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            background: #0a0a0f;
            color: #fff;
        }
        
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
        
        #info-panel {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 12px;
            max-width: 350px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #info-panel h1 {
            font-size: 18px;
            margin-bottom: 12px;
            color: #60a5fa;
        }
        
        #info-panel .stat {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 14px;
        }
        
        #info-panel .stat:last-child {
            border-bottom: none;
        }
        
        #info-panel .stat-label {
            color: #9ca3af;
        }
        
        #info-panel .stat-value {
            color: #fff;
            font-weight: 500;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        #loading .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 悬浮工具球 */
        #controls-fab {
            position: fixed;
            z-index: 500;
            /* 初始位置由 JS 通过 left/top 设置 */
            transition: left 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        top 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #controls-fab.dragging {
            transition: none;
        }

        /* 触发球 */
        #fab-toggle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(96, 165, 250, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 22px;
            cursor: grab;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 2;
            touch-action: none;
        }

        #fab-toggle:hover {
            background: rgba(96, 165, 250, 1);
        }

        #controls-fab.dragging #fab-toggle {
            cursor: grabbing;
            transition: none;
        }

        /* 折叠态：半球吸附到边缘 */
        #controls-fab.collapsed #fab-toggle {
            width: 36px;
            height: 44px;
            background: rgba(96, 165, 250, 0.5);
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }

        #controls-fab.collapsed #fab-toggle:hover {
            background: rgba(96, 165, 250, 0.8);
        }

        /* 各边缘吸附方向 */
        #controls-fab.collapsed[data-edge="right"] #fab-toggle {
            border-radius: 50% 0 0 50%;
            transform: translateX(18px);
        }
        #controls-fab.collapsed[data-edge="right"] #fab-toggle:hover {
            transform: translateX(12px);
        }
        #controls-fab.collapsed[data-edge="left"] #fab-toggle {
            border-radius: 0 50% 50% 0;
            transform: translateX(-18px);
        }
        #controls-fab.collapsed[data-edge="left"] #fab-toggle:hover {
            transform: translateX(-12px);
        }
        #controls-fab.collapsed[data-edge="bottom"] #fab-toggle {
            border-radius: 50% 50% 0 0;
            transform: translateY(18px);
        }
        #controls-fab.collapsed[data-edge="bottom"] #fab-toggle:hover {
            transform: translateY(12px);
        }
        #controls-fab.collapsed[data-edge="top"] #fab-toggle {
            border-radius: 0 0 50% 50%;
            transform: translateY(-18px);
        }
        #controls-fab.collapsed[data-edge="top"] #fab-toggle:hover {
            transform: translateY(-12px);
        }

        /* 按钮面板 */
        #fab-panel {
            position: absolute;
            bottom: 56px;
            right: -8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: flex-end;
            pointer-events: none;
            opacity: 0;
            transform: translateY(12px) scale(0.9);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #controls-fab.expanded #fab-panel {
            pointer-events: auto;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        #fab-panel button {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            padding: 10px 16px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 24px;
            color: #fff;
            font-size: 13px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }

        #fab-panel button:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        #fab-panel button.active {
            background: #60a5fa;
            color: #000;
            border-color: #60a5fa;
        }
        
        #tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.95);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            pointer-events: none;
            display: none;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
        }
        
        #tooltip .path {
            color: #60a5fa;
            word-break: break-all;
            margin-bottom: 8px;
        }
        
        #tooltip .index {
            color: #9ca3af;
            font-size: 12px;
        }
        
        #data-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.85);
            padding: 20px;
            border-radius: 12px;
            max-width: 400px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        #data-panel h2 {
            font-size: 16px;
            margin-bottom: 15px;
            color: #60a5fa;
        }
        
        .data-option {
            margin-bottom: 12px;
        }
        
        .data-option label {
            display: block;
            margin-bottom: 6px;
            color: #9ca3af;
            font-size: 14px;
        }
        
        .data-option select,
        .data-option input[type="file"] {
            width: 100%;
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 14px;
        }
        
        .data-option select:focus {
            outline: none;
            border-color: #60a5fa;
        }
        
        .data-option select option {
            background: #1a1a2e;
            color: #fff;
        }
        
        #btn-load {
            width: 100%;
            padding: 10px;
            background: #60a5fa;
            color: #000;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
            margin-top: 10px;
        }
        
        #btn-load:hover {
            background: #3b82f6;
        }
        
        #btn-load:disabled {
            background: #4b5563;
            cursor: not-allowed;
        }
        
        #status-msg {
            margin-top: 10px;
            font-size: 13px;
            color: #9ca3af;
        }
        
        #status-msg.success {
            color: #34d399;
        }
        
        #status-msg.error {
            color: #f87171;
        }
        
        #processing {
            display: none;
            margin-top: 10px;
        }
        
        #processing .spinner-small {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #60a5fa;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        
        #log-panel {
            position: absolute;
            bottom: 80px;
            right: 20px;
            width: 600px;
            height: 300px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(10px);
            z-index: 100;
        }
        
        #log-controls {
            display: flex;
            gap: 4px;
        }
        
        #log-controls button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            width: 28px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #log-controls button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        #log-controls button.active {
            background: #60a5fa;
            color: #000;
        }
        
        #log-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 12px;
            line-height: 1.5;
        }
        
        #log-content .log-line {
            margin-bottom: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        
        #log-content .log-line.info {
            color: #9ca3af;
        }
        
        #log-content .log-line.success {
            color: #34d399;
        }
        
        #log-content .log-line.warning {
            color: #fbbf24;
        }
        
        #log-content .log-line.error {
            color: #f87171;
        }
        
        #log-content .log-line.highlight {
            color: #60a5fa;
            font-weight: 500;
        }
        
        #log-content::-webkit-scrollbar {
            width: 8px;
        }
        
        #log-content::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        #log-content::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        
        #log-content::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        #log-panel.collapsed #log-content {
            display: none;
        }
        
        #log-panel.collapsed {
            width: auto;
        }
        
        /* 采点卡片 — 始终可见的面板 */
        #selection-card {
            position: absolute;
            left: 20px;
            bottom: 80px;
            width: 500px;
            max-height: 50vh;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .card-radius-control {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .card-radius-control label {
            color: #9ca3af;
            font-size: 13px;
            white-space: nowrap;
        }
        
        #radius-value {
            color: #60a5fa;
            font-weight: 600;
        }
        
        #radius-slider {
            flex: 1;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }
        
        #radius-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #60a5fa;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        #radius-slider::-webkit-slider-thumb:hover {
            background: #3b82f6;
            transform: scale(1.2);
        }
        
        .card-images {
            flex: 1;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .card-images::-webkit-scrollbar {
            height: 8px;
        }
        
        .card-images::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }
        
        .card-images::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
        }
        
        .card-images::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .card-placeholder {
            color: #9ca3af;
            font-size: 13px;
            padding: 20px;
            text-align: center;
            width: 100%;
        }
        
        /* 采点模式光标 */
        #canvas-container.pick-mode canvas {
            cursor: crosshair !important;
        }
        
        .neighbor-image-wrapper {
            flex-shrink: 0;
            width: 120px;
            height: 120px;
            border-radius: 8px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(96, 165, 250, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .neighbor-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .neighbor-image-wrapper img:not([src]) {
            visibility: hidden;
        }
        
        /* 面板最小化到悬浮球 */
        .draggable-panel.hidden-to-fab {
            display: none !important;
        }

        /* FAB 中的最小化面板标签 */
        #fab-minimized-tabs:empty {
            display: none;
        }

        #fab-minimized-tabs {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 8px;
        }

        .fab-minimized-tab {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            padding: 8px 14px;
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 24px;
            color: #9ca3af;
            font-size: 12px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            transition: all 0.2s;
        }

        .fab-minimized-tab:hover {
            background: rgba(96, 165, 250, 0.2);
            color: #fff;
            border-color: #60a5fa;
        }
        
        .panel-header button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 4px;
        }
        
        .panel-header button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .panel-header button.active {
            background: #60a5fa;
            color: #000;
        }
        
        .panel-header .panel-close:hover {
            background: rgba(248, 113, 113, 0.5);
        }
        
        /* 可拖动窗口通用样式 */
        .draggable-panel {
            position: absolute;
            cursor: move;
            user-select: none;
        }
        
        .draggable-panel .panel-header {
            cursor: move;
            padding: 8px 12px;
            background: rgba(96, 165, 250, 0.15);
            border-radius: 12px 12px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .draggable-panel .panel-header:active {
            cursor: grabbing;
        }
        
        .draggable-panel .panel-content {
            cursor: default;
            user-select: text;
            overflow: auto;
        }
        
        /* 缩放手柄 */
        .panel-resize-handle {
            position: absolute;
            right: 0;
            bottom: 0;
            width: 16px;
            height: 16px;
            cursor: nwse-resize;
            z-index: 10;
        }
        
        .panel-resize-handle::before,
        .panel-resize-handle::after {
            content: '';
            position: absolute;
            right: 4px;
            height: 1.5px;
            background: rgba(255, 255, 255, 0.25);
            transform: rotate(-45deg);
            transform-origin: right center;
        }
        
        .panel-resize-handle::before {
            bottom: 10px;
            width: 12px;
        }
        
        .panel-resize-handle::after {
            bottom: 5px;
            width: 7px;
        }
        
        .panel-resize-handle:hover::before,
        .panel-resize-handle:hover::after {
            background: rgba(96, 165, 250, 0.6);
        }
        
        .draggable-panel.hidden-to-fab .panel-resize-handle {
            display: none;
        }
        
        /* 吸附提示 */
        .snap-indicator {
            position: absolute;
            background: rgba(96, 165, 250, 0.5);
            border: 2px solid #60a5fa;
            border-radius: 4px;
            pointer-events: none;
            z-index: 9999;
            transition: all 0.1s ease;
        }
        
        /* 服务器路径输入 */
        .server-path-row {
            display: flex;
            gap: 6px;
        }
        
        .server-path-row input {
            flex: 1;
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
        }
        
        .server-path-row input:focus {
            outline: none;
            border-color: #60a5fa;
        }
        
        .server-path-row button {
            padding: 8px 12px;
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid rgba(96, 165, 250, 0.4);
            border-radius: 6px;
            color: #60a5fa;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .server-path-row button:hover {
            background: rgba(96, 165, 250, 0.35);
        }

        /* 文件浏览弹窗 */
        #browse-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 9999;
            align-items: center;
            justify-content: center;
        }
        
        #browse-modal.open {
            display: flex;
        }
        
        #browse-box {
            background: #141420;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            width: 520px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #browse-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(96, 165, 250, 0.1);
        }
        
        #browse-header span {
            flex: 1;
            font-size: 13px;
            color: #9ca3af;
            word-break: break-all;
        }
        
        #browse-header button {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }
        
        #browse-header button:hover { background: rgba(255,255,255,0.2); }
        
        #browse-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }
        
        .browse-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.15s;
        }
        
        .browse-item:hover { background: rgba(255, 255, 255, 0.07); }
        
        .browse-item.dir { color: #93c5fd; }
        .browse-item.file { color: #d1fae5; }
        .browse-item .icon { font-size: 16px; width: 20px; flex-shrink: 0; }
        
        #browse-footer {
            padding: 10px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }
        
        #browse-footer button {
            padding: 7px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }
        
        #btn-browse-cancel { background: rgba(255,255,255,0.1); color: #fff; }
        #btn-browse-cancel:hover { background: rgba(255,255,255,0.18); }
        
        /* 自动排版布局预设位置 */
        .layout-top-left { top: 20px; left: 20px; }
        .layout-top-right { top: 20px; right: 20px; }
        .layout-bottom-left { bottom: 80px; left: 20px; }
        .layout-bottom-right { bottom: 80px; right: 20px; }

        /* 过滤器卡片 */
        #filter-card {
            position: absolute;
            left: 20px;
            top: 260px;
            width: 340px;
            max-height: 60vh;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            z-index: 100;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        #filter-card.visible {
            display: flex;
        }

        .filter-select-row {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .filter-select-row label {
            color: #9ca3af;
            font-size: 13px;
            display: block;
            margin-bottom: 6px;
        }

        .filter-select-row select {
            width: 100%;
            padding: 7px 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        .filter-select-row select:focus {
            border-color: #60a5fa;
        }

        .filter-select-row select option {
            background: #1a1a2e;
            color: #fff;
        }

        .filter-params {
            padding: 12px 16px;
            overflow-y: auto;
            flex: 1;
        }

        .filter-param-group {
            margin-bottom: 12px;
        }

        .filter-param-group label {
            color: #9ca3af;
            font-size: 13px;
            display: block;
            margin-bottom: 6px;
        }

        .filter-param-group input[type="range"] {
            width: 100%;
            height: 6px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        .filter-param-group input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #60a5fa;
            cursor: pointer;
        }

        .filter-param-group input[type="text"] {
            width: 100%;
            padding: 7px 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            color: #fff;
            font-size: 13px;
            outline: none;
        }

        .filter-param-group input[type="text"]:focus {
            border-color: #60a5fa;
        }

        .filter-checkbox-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            max-height: 180px;
            overflow-y: auto;
            padding: 4px 0;
        }

        .filter-checkbox-grid::-webkit-scrollbar {
            width: 6px;
        }

        .filter-checkbox-grid::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .filter-checkbox-grid::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
        }

        .filter-chip {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            background: rgba(96, 165, 250, 0.15);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 14px;
            font-size: 12px;
            color: #93c5fd;
            cursor: pointer;
            transition: all 0.15s;
            user-select: none;
        }

        .filter-chip:hover {
            background: rgba(96, 165, 250, 0.25);
        }

        .filter-chip.selected {
            background: #60a5fa;
            color: #000;
            border-color: #60a5fa;
        }

        .filter-chip-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }

        .filter-chip-actions button {
            background: none;
            border: none;
            color: #60a5fa;
            font-size: 12px;
            cursor: pointer;
            padding: 2px 0;
        }

        .filter-chip-actions button:hover {
            text-decoration: underline;
        }

        .filter-actions {
            padding: 10px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 8px;
        }

        .filter-actions button {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        #btn-filter-apply {
            background: #60a5fa;
            color: #000;
            font-weight: 500;
        }

        #btn-filter-apply:hover {
            background: #3b82f6;
        }

        #btn-filter-reset {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        #btn-filter-reset:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .filter-status {
            padding: 6px 16px;
            font-size: 12px;
            color: #9ca3af;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .filter-status .count {
            color: #60a5fa;
            font-weight: 600;
        }

        /* 设置弹窗 */
        #settings-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            justify-content: center;
            align-items: center;
        }

        #settings-overlay.open {
            display: flex;
        }

        #settings-card {
            width: min(520px, 90vw);
            max-height: 80vh;
            background: rgba(20, 20, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: settingsFadeIn 0.25s ease;
        }

        @keyframes settingsFadeIn {
            from { opacity: 0; transform: scale(0.95) translateY(12px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            font-size: 15px;
            font-weight: 600;
        }

        #btn-settings-close {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: #9ca3af;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        #btn-settings-close:hover {
            background: rgba(248, 113, 113, 0.4);
            color: #fff;
        }

        .settings-body {
            padding: 16px 20px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .settings-group-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #60a5fa;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .settings-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 0;
            cursor: default;
        }

        .settings-label {
            flex: 0 0 120px;
            font-size: 13px;
            color: #d1d5db;
        }

        .settings-row input[type="range"] {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.12);
            border-radius: 2px;
            outline: none;
        }

        .settings-row input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #60a5fa;
            cursor: pointer;
            border: 2px solid rgba(0, 0, 0, 0.3);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .settings-row input[type="range"]::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #60a5fa;
            cursor: pointer;
            border: 2px solid rgba(0, 0, 0, 0.3);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }

        .settings-value {
            flex: 0 0 36px;
            text-align: right;
            font-size: 12px;
            color: #9ca3af;
            font-variant-numeric: tabular-nums;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="info-panel" class="draggable-panel layout-top-left">
        <div class="panel-header">
            <span>🌌 统计信息</span>
            <button class="panel-minimize" title="最小化">−</button>
        </div>
        <div class="panel-content">
            <div class="stat">
                <span class="stat-label">点数</span>
                <span class="stat-value" id="stat-points">-</span>
            </div>
            <div class="stat">
                <span class="stat-label">特征维度</span>
                <span class="stat-value" id="stat-dim">-</span>
            </div>
            <div class="stat">
                <span class="stat-label">模型</span>
                <span class="stat-value" id="stat-model">-</span>
            </div>
            <div class="stat">
                <span class="stat-label">UMAP 邻居</span>
                <span class="stat-value" id="stat-neighbors">-</span>
            </div>
        </div>
    </div>
    
    <div id="data-panel" class="draggable-panel layout-top-right">
        <div class="panel-header">
            <span>📁 数据集</span>
            <button class="panel-minimize" title="最小化">−</button>
        </div>
        <div class="panel-content" style="padding:12px;">
        <div class="data-option">
            <label for="file-upload">或上传 paths.txt 文件</label>
            <input type="file" id="file-upload" accept=".txt">
        </div>
        <div class="data-option">
            <label>或选择服务器上的文件</label>
            <div class="server-path-row">
                <input type="text" id="server-path-input" placeholder="服务器文件路径..." />
                <button id="btn-browse">浏览...</button>
            </div>
        </div>
        <button id="btn-load">🚀 加载并处理</button>
        <div id="status-msg"></div>
        <div id="processing">
            <span class="spinner-small"></span>
            <span id="processing-text">处理中，请稍候...</span>
        </div>
        </div>
    </div>
    
    <div id="log-panel" class="draggable-panel layout-bottom-right">
        <div class="panel-header">
            <span>📜 处理日志</span>
            <div id="log-controls">
                <button id="btn-log-scroll" class="active" title="自动滚动">📜</button>
                <button id="btn-log-clear" title="清空日志">🗑️</button>
                <button id="btn-log-collapse" title="折叠/展开">📐</button>
                <button class="panel-minimize" title="最小化">−</button>
            </div>
        </div>
        <div class="panel-content" id="log-content"></div>
    </div>
    
    <div id="loading" style="display:none">
        <div class="spinner"></div>
        <p>加载数据中...</p>
    </div>
    
    <div id="controls-fab" class="collapsed">
        <div id="fab-panel">
            <button id="btn-rotate" class="active">🔄 自动旋转</button>
            <button id="btn-reset">🎯 重置视角</button>
            <button id="btn-screenshot">📷 截图</button>
            <button id="btn-settings">⚙️ 设置</button>
            <div id="fab-minimized-tabs"></div>
        </div>
        <button id="fab-toggle" title="工具栏">🛠</button>
    </div>
    
    <!-- 设置弹窗 -->
    <div id="settings-overlay">
        <div id="settings-card">
            <div class="settings-header">
                <span>⚙️ 设置</span>
                <button id="btn-settings-close" title="关闭">✕</button>
            </div>
            <div class="settings-body">
                <div class="settings-group">
                    <div class="settings-group-title">外观</div>
                    <label class="settings-row">
                        <span class="settings-label">点大小</span>
                        <input type="range" id="set-point-size" min="1" max="12" step="0.5" value="2">
                        <span class="settings-value" id="set-point-size-val">2</span>
                    </label>
                    <label class="settings-row">
                        <span class="settings-label">点透明度</span>
                        <input type="range" id="set-opacity" min="0.1" max="1" step="0.05" value="0.9">
                        <span class="settings-value" id="set-opacity-val">0.9</span>
                    </label>
                    <label class="settings-row">
                        <span class="settings-label">悬浮放大倍数</span>
                        <input type="range" id="set-hover-scale" min="1.5" max="8" step="0.5" value="3">
                        <span class="settings-value" id="set-hover-scale-val">3</span>
                    </label>
                </div>
                <div class="settings-group">
                    <div class="settings-group-title">动画</div>
                    <label class="settings-row">
                        <span class="settings-label">自动旋转速度</span>
                        <input type="range" id="set-rotate-speed" min="0.2" max="10" step="0.2" value="2">
                        <span class="settings-value" id="set-rotate-speed-val">2</span>
                    </label>
                    <label class="settings-row">
                        <span class="settings-label">相机过渡平滑度</span>
                        <input type="range" id="set-cam-smooth" min="0.05" max="1" step="0.05" value="0.15">
                        <span class="settings-value" id="set-cam-smooth-val">0.15</span>
                    </label>
                </div>
            </div>
        </div>
    </div>

    <!-- 服务器文件浏览弹窗 -->
    <div id="browse-modal">
        <div id="browse-box">
            <div id="browse-header">
                <button id="btn-browse-up">⬆ 上级</button>
                <span id="browse-current-path">/</span>
            </div>
            <div id="browse-list"></div>
            <div id="browse-footer">
                <button id="btn-browse-cancel">取消</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="/static/viewer.js?v=7"></script>
</body>
</html>
